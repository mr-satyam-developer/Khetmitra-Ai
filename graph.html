<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>विश्लेषण - KhetMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --bg: #f8fafc; }
        body { font-family: 'Mukta', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #059669 0%, #064e3b 100%) !important; }
        .chart-card { background: white; border-radius: 35px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-top: -40px; border: 1px solid white; }
        .time-btn { padding: 10px 18px; border-radius: 15px; font-size: 12px; font-weight: 800; background: #f1f5f9; color: #64748b; transition: 0.3s; }
        .time-btn.active { background: var(--p); color: white; box-shadow: 0 8px 15px rgba(5,150,105,0.3); }
    </style>
</head>
<body>
    <header class="premium-gradient p-6 pb-20 text-white flex items-center gap-4 shadow-lg">
        <i class="fas fa-arrow-left" onclick="window.location.href='./mandi.html'"></i>
        <div>
            <h2 class="font-bold text-xl" id="crop-name">फसल भाव</h2>
            <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">बाज़ार का रुझान</p>
        </div>
    </header>

    <main class="p-5">
        <div class="chart-card">
            <div class="flex justify-between mb-8 overflow-x-auto gap-2 no-scrollbar">
                <button class="time-btn" onclick="updateChart(1)">1 दिन</button>
                <button class="time-btn" onclick="updateChart(5)">5 दिन</button>
                <button class="time-btn active" onclick="updateChart(7)">7 दिन</button>
                <button class="time-btn" onclick="updateChart(30)">1 महीना</button>
            </div>
            <canvas id="priceChart" height="280"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="bg-white p-5 rounded-[30px] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">सबसे ज़्यादा</p>
                <h4 class="text-xl font-black text-slate-800" id="max-p">₹0</h4>
            </div>
            <div class="bg-white p-5 rounded-[30px] shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">सबसे कम</p>
                <h4 class="text-xl font-black text-slate-800" id="min-p">₹0</h4>
            </div>
        </div>

        <div class="bg-green-50 p-5 rounded-[30px] mt-6 border border-green-100 flex items-start gap-4">
            <i class="fas fa-lightbulb text-green-600 mt-1"></i>
            <p class="text-xs text-green-700 leading-relaxed font-medium">
                <b>KhetMitra सलाह:</b> पिछले कुछ दिनों के डेटा के अनुसार भाव में सुधार हो रहा है। अपनी फसल बेचने के लिए यह एक अच्छा समय हो सकता है।
            </p>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const cropId = params.get('id') || 'wheat';
        const cropName = params.get('name') || 'फसल';
        const basePrice = parseInt(params.get('price')) || 2000;

        document.getElementById('crop-name').innerText = cropName;

        // Generate or Get Persistent Data
        function getHistory() {
            let key = 'history_' + cropId;
            let saved = localStorage.getItem(key);
            if (saved) return JSON.parse(saved);

            let data = [];
            let tempPrice = basePrice;
            for(let i=0; i<31; i++) {
                tempPrice += (Math.random() * 60) - 30;
                data.push(Math.round(tempPrice));
            }
            localStorage.setItem(key, JSON.stringify(data));
            return data;
        }

        let chart;
        function updateChart(days) {
            // UI Update
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const history = getHistory();
            const displayData = history.slice(-days);
            const labels = Array.from({length: days}, (_, i) => {
                let d = new Date();
                d.setDate(d.getDate() - (days - 1 - i));
                return d.getDate() + " " + d.toLocaleString('hi-IN', {month: 'short'});
            });

            document.getElementById('max-p').innerText = "₹" + Math.max(...displayData);
            document.getElementById('min-p').innerText = "₹" + Math.min(...displayData);

            if(chart) chart.destroy();
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: displayData,
                        borderColor: '#059669',
                        borderWidth: 4,
                        pointRadius: days > 7 ? 0 : 4,
                        pointBackgroundColor: '#059669',
                        fill: true,
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 9 } } },
                        y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } }
                    }
                }
            });
        }

        window.onload = () => {
            const btns = document.querySelectorAll('.time-btn');
            updateChart(7); // Default 7 days
        };
    </script>
</body>
</html>
