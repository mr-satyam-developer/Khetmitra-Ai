<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KhetMitra AI</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: linear-gradient(135deg, #059669 0%, #064e3b 100%); color: white; overflow: hidden; }
        .logo-box { width: 120px; height: 120px; background: white; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: bounce 2s infinite; margin-bottom: 20px; overflow: hidden; padding: 0; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        p { opacity: 0.8; font-size: 18px; margin-top: 5px; font-style: italic; }
        .footer { position: fixed; bottom: 30px; font-size: 10px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="logo.jpg" alt="KhetMitra Logo">
    </div>
    <h1>KHETMITRA AI</h1>
    <p>किसानों का असली साथी</p>
    <div class="footer">Developed by Satyam Kumar</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCSvMpcYvrUzPaii6ijoNAPUF6PAG4zhGY", authDomain: "khetmitra-4bc9e.firebaseapp.com", projectId: "khetmitra-4bc9e", storageBucket: "khetmitra-4bc9e.firebasestorage.app", messagingSenderId: "545280122993", appId: "1:545280122993:web:dd23233f2e2090c6513bd0" };
        firebase.initializeApp(firebaseConfig);

        // --- FIXED LOGIC ---
        firebase.auth().onAuthStateChanged(user => {
            setTimeout(() => {
                if (user) {
                    // अगर लॉगिन है तो चेक करो सेटअप हुआ या नहीं
                    if (localStorage.getItem('setupDone') === 'true') {
                        window.location.href = 'home.html';
                    } else {
                        window.location.href = 'setup.html';
                    }
                } else {
                    // अगर लॉगिन नहीं है तो लॉगिन पेज
                    window.location.href = 'login.html';
                }
            }, 3000);
        });
    </script>
</body>
</html>
