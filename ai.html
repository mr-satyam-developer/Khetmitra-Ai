<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KhetMitra AI - गर्व से भारतीय</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --s: #064e3b; }
        body { font-family: 'Mukta', sans-serif; background: #f8fafc; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .premium-gradient { background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%) !important; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .ai-bubble { background: #e8f5e9; border-radius: 22px 22px 22px 0; padding: 16px; margin: 10px 0; align-self: flex-start; max-width: 88%; color: #064e3b; border: 1px solid #c8e6c9; font-size: 15px; line-height: 1.6; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .user-bubble { background: var(--p); color: white; border-radius: 22px 22px 0 22px; padding: 14px 18px; margin: 10px 0; align-self: flex-end; max-width: 85%; font-size: 15px; box-shadow: 0 4px 12px rgba(5,150,105,0.2); }
        .suggestion-list { display: flex; flex-direction: column; gap: 12px; margin: 15px 0; }
        .suggestion-row { background: white; border: 1.5px solid #e2e8f0; padding: 16px; border-radius: 22px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); color: #374151; }
        .suggestion-row:active { transform: scale(0.96); background: #f0fdf4; border-color: var(--p); }
        .suggestion-row i { color: var(--p); background: #ecfdf5; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
    </style>
</head>
<body>
    <header class="premium-gradient text-white p-5 flex items-center justify-between shadow-lg shrink-0">
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left" onclick="window.location.href='./home.html'"></i>
            <h2 class="font-bold text-lg">KhetMitra AI एक्सपर्ट</h2>
        </div>
        <div class="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full border border-white/30">
            <span class="text-[10px] font-bold uppercase tracking-tighter">Proudly Indian</span>
            <i class="fas fa-flag text-[10px]"></i>
        </div>
    </header>

    <div id="chat-box" class="scroll-area flex flex-col">
        <div class="ai-bubble">नमस्ते! मैं <b>KhetMitra AI</b> हूँ। गर्व से भारतीय और आपके खेतों का सच्चा साथी। मैं आपकी कैसे मदद कर सकता हूँ?</div>
        
        <div id="suggestions" class="suggestion-list">
            <div class="suggestion-row" onclick="askAI('मिट्टी की उर्वरता बढ़ाने के लिए फसल चक्र का सही तरीका क्या है?')">
                <i class="fas fa-seedling"></i> मिट्टी की शक्ति बढ़ाने के उपाय
            </div>
            <div class="suggestion-row" onclick="askAI('खेती में लागत कम करने और शुद्ध मुनाफा बढ़ाने के लिए सबसे असरदार तरीके क्या हैं?')">
                <i class="fas fa-chart-line"></i> कम लागत में ज़्यादा मुनाफा
            </div>
            <div class="suggestion-row" onclick="askAI('ड्रिप सिंचाई और सोलर पंप के लिए सरकारी सब्सिडी कैसे प्राप्त करें?')">
                <i class="fas fa-tint"></i> सिंचाई और सरकारी सब्सिडी
            </div>
        </div>
    </div>

    <div class="p-4 bg-white border-t flex gap-3 pb-24 items-center shrink-0">
        <input type="text" id="user-input" placeholder="यहाँ अपना सवाल लिखें..." class="flex-1 bg-gray-100 p-4 rounded-full outline-none border-2 border-transparent focus:border-green-600 shadow-inner text-sm">
        <button onclick="handleSend()" class="w-14 h-14 premium-gradient text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><i class="fas fa-paper-plane text-xl"></i></button>
    </div>

    <script>
        const K1 = "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";
        const K2 = "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";
        const M1 = "google/gemma-2-27b-it";
        const M2 = "be-pal/owl-v2";

        // --- UPDATED PROUDLY INDIAN SYSTEM PROMPT ---
        const SYSTEM_PROMPT = `Your name is KhetMitra AI. You are a proudly Indian (गर्व से भारतीय) agriculture expert AI. 
        You were developed by Satyam Kumar specifically to help Indian farmers. 
        When asked about your identity or name, always say: "मेरा नाम KhetMitra AI है। मुझे गर्व है कि मैं भारतीय हूँ और मुझे विशेष रूप से भारत के किसाऩों की मदद के लिए सत्यम कुमार द्वारा डिज़ाइन किया गया है।"
        Always answer in simple, clear, and respectful Hindi. Provide advice based on Indian soil, climate, and crops.`;

        async function askAI(query) {
            document.getElementById('suggestions').style.display = 'none';
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="user-bubble">${query}</div>`;
            box.scrollTop = box.scrollHeight;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "ai-bubble italic text-gray-400";
            loadingDiv.innerText = "KhetMitra विश्लेषण कर रहा है...";
            box.appendChild(loadingDiv);

            try {
                await fetchResponse(K1, M1, query, loadingDiv);
            } catch (e) {
                try {
                    await fetchResponse(K2, M2, query, loadingDiv);
                } catch (err) {
                    loadingDiv.innerText = "क्षमा करें, सर्वर अभी व्यस्त है। कृपया इंटरनेट चेक करें।";
                }
            }
            box.scrollTop = box.scrollHeight;
        }

        async function fetchResponse(key, model, query, el) {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    "model": model, 
                    "messages": [
                        {"role": "system", "content": SYSTEM_PROMPT},
                        {"role": "user", "content": query}
                    ] 
                })
            });
            const data = await res.json();
            if (data.choices && data.choices[0].message) {
                el.innerText = data.choices[0].message.content;
                el.classList.remove('italic', 'text-gray-400');
            } else { throw new Error("Fail"); }
        }

        function handleSend() {
            const input = document.getElementById('user-input');
            if(input.value) { askAI(input.value); input.value = ""; }
        }
    </script>
</body>
</html>
