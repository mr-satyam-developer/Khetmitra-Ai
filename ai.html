<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KhetMitra AI - चैट</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --s: #064e3b; }
        body { font-family: 'Mukta', sans-serif; background: #f8fafc; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .premium-gradient { background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%) !important; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .ai-bubble { background: #e8f5e9; border-radius: 20px 20px 20px 0; padding: 14px; margin: 10px 0; align-self: flex-start; max-width: 85%; color: #064e3b; border: 1px solid #c8e6c9; }
        .user-bubble { background: var(--p); color: white; border-radius: 20px 20px 0 20px; padding: 14px; margin: 10px 0; align-self: flex-end; max-width: 85%; box-shadow: 0 4px 10px rgba(5,150,105,0.2); }
        .suggestion-item { background: white; border: 1px solid #e2e8f0; padding: 14px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .suggestion-item i { color: var(--p); width: 25px; text-align: center; }
    </style>
</head>
<body>
    <header class="premium-gradient text-white p-4 flex items-center gap-4 shadow-md shrink-0">
        <i class="fas fa-arrow-left" onclick="window.location.href='home.html'"></i>
        <h2 class="font-bold text-lg">KhetMitra AI सहायक</h2>
    </header>
    <div id="chat-box" class="scroll-area flex flex-col">
        <div class="ai-bubble">राम-राम! मैं KhetMitra AI हूँ। क्या आप इनमें से कुछ जानना चाहते हैं?</div>
        <div id="suggestions" class="flex flex-col py-2">
            <div class="suggestion-item" onclick="askAI('Agle 7 dino me mausam kaisa rahega aur mujhe kaun si fasal boni chahiye?')"><i class="fas fa-cloud-sun-rain"></i> मौसम और खेती की सलाह</div>
            <div class="suggestion-item" onclick="askAI('Meri fasal के patte pile ho rahe hain, iska kya ilaj hai?')"><i class="fas fa-bug"></i> कीड़े और बीमारी का इलाज</div>
            <div class="suggestion-item" onclick="askAI('Kisanon ke liye abhi kaun si nayi sarkari yojana chal rahi hai?')"><i class="fas fa-landmark"></i> सरकारी योजना और सब्सिडी</div>
            <div class="suggestion-item" onclick="askAI('Aaj mandi me Gehun aur Dhan ka bhav kya hai?')"><i class="fas fa-chart-line"></i> मंडी के भाव</div>
            <div class="suggestion-item" onclick="askAI('Organic kheti kaise shuru karein?')"><i class="fas fa-seedling"></i> कम लागत में ज़्यादा मुनाफा</div>
        </div>
    </div>
    <div class="p-4 bg-white border-t flex gap-2 pb-10 items-center shrink-0">
        <input type="text" id="user-input" placeholder="यहाँ सवाल लिखें..." class="flex-1 bg-gray-100 p-4 rounded-full outline-none border focus:border-green-600">
        <button onclick="handleSend()" class="w-12 h-12 premium-gradient text-white rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
    </div>
    <script>
        const AK = "AIzaSyDdms2rUBleiIHTDHST6rAEZdZDQ5Kt_oQ";
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${AK}`;
        async function askAI(query) {
            document.getElementById('suggestions').style.display = 'none';
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="user-bubble">${query}</div>`;
            box.scrollTop = box.scrollHeight;
            const loadingDiv = document.createElement('div'); loadingDiv.className = "ai-bubble italic text-gray-400"; loadingDiv.innerText = "KhetMitra सोच रहा है..."; box.appendChild(loadingDiv);
            try {
                const response = await fetch(MODEL_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: [{parts: [{text: "Answer in Hindi: " + query}]}]}) });
                const data = await response.json(); loadingDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch(e) { loadingDiv.innerText = "त्रुटि! इंटरनेट चेक करें।"; }
            box.scrollTop = box.scrollHeight;
        }
        function handleSend() { const input = document.getElementById('user-input'); if(input.value) { askAI(input.value); input.value = ""; } }
    </script>
</body>
</html>
