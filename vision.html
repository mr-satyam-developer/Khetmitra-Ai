<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>फसल डॉक्टर - KhetMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --bg: #f8fafc; }
        body { font-family: 'Mukta', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .premium-gradient { background: linear-gradient(135deg, #059669 0%, #064e3b 100%) !important; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 100px; text-align: center; }
        .preview-box { width: 100%; height: 300px; background: #f1f5f9; border: 3px dashed #cbd5e1; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 25px; }
        .report-card { background: #f0fdf4; border-radius: 30px; border: 1.5px solid #dcfce7; padding: 20px; text-align: left; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center gap-4 shadow-md shrink-0">
        <i class="fas fa-arrow-left" onclick="window.location.href='home.html'"></i>
        <h2 class="font-bold text-lg">फसल रोग जांच</h2>
    </header>

    <main class="scroll-area">
        <div id="preview" class="preview-box">
            <i class="fas fa-image text-6xl text-slate-200"></i>
            <p class="text-slate-400 mt-3 font-bold uppercase text-xs">फोटो यहाँ दिखेगी</p>
        </div>

        <input type="file" id="cam-file" accept="image/*" capture="environment" class="hidden" onchange="runVision(event)">
        
        <button onclick="document.getElementById('cam-file').click()" class="w-full premium-gradient p-5 rounded-[25px] text-white font-bold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-camera text-2xl"></i> फोटो चुनें या कैमरा खोलें
        </button>

        <div id="v-report" class="hidden report-card">
            <div class="flex items-center gap-2 mb-3 text-green-700 font-bold">
                <i class="fas fa-magic animate-pulse"></i> AI जांच रिपोर्ट:
            </div>
            <div id="report-text" class="text-sm leading-relaxed text-slate-700 whitespace-pre-wrap"></div>
        </div>
    </main>

    <script>
        const AK = "AIzaSyDdms2rUBleiIHTDHST6rAEZdZDQ5Kt_oQ";
        const EP = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${AK}`;

        async function runVision(e) {
            const file = e.target.files[0]; if(!file) return;
            const report = document.getElementById('v-report');
            const reportText = document.getElementById('report-text');
            const preview = document.getElementById('preview');
            
            const reader = new FileReader();
            reader.onload = (ev) => preview.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
            reader.readAsDataURL(file);

            report.classList.remove('hidden');
            reportText.innerHTML = "<b>AI आपकी फसल की जांच कर रहा है...</b>";

            const b64 = await new Promise(r => { const fr = new FileReader(); fr.readAsDataURL(file); fr.onload = () => r(fr.result.split(',')[1]); });

            try {
                const res = await fetch(EP, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Identify crop disease and suggest organic/chemical treatment in Hindi language only." },
                                { inline_data: { mime_type: "image/jpeg", data: b64 } }
                            ]
                        }]
                    })
                });
                const data = await res.json();
                reportText.innerText = data.candidates[0].content.parts[0].text;
            } catch(err) { reportText.innerText = "जांच विफल। इंटरनेट चेक करें।"; }
        }
    </script>
</body>
</html>
