<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>फसल डॉक्टर - KhetMitra AI</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --p: #059669; --s: #064e3b; --bg: #f8fafc; }
        body { font-family: 'Mukta', sans-serif; margin: 0; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #059669 0%, #064e3b 100%) !important; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; text-align: center; scroll-behavior: smooth; }
        .preview-box { width: 100%; height: 320px; background: #ffffff; border: 3px dashed #cbd5e1; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 25px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); }
        .action-btn { padding: 18px; border-radius: 22px; font-weight: 800; font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: none; cursor: pointer; }
        .btn-camera { background: var(--p); color: white; }
        .btn-gallery { background: white; color: var(--p); border: 2px solid var(--p); margin-top: 12px; }
        .report-card { background: #ffffff; border-radius: 30px; border: 1px solid #e2e8f0; padding: 25px; text-align: left; margin-top: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center justify-between shadow-lg shrink-0">
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left" onclick="window.location.href='./home.html'"></i>
            <h2 class="font-bold text-lg">फसल रोग विशेषज्ञ</h2>
        </div>
        <div class="bg-white/20 px-3 py-1 rounded-full border border-white/30 text-[10px] font-bold uppercase">
            Bhartiya AI <i class="fas fa-flag ml-1"></i>
        </div>
    </header>

    <main class="scroll-area" id="main-scroll">
        <div class="bg-[#e8f5e9] rounded-2xl p-4 mb-5 border border-green-100">
            <p class="text-green-800 font-bold text-sm">
                गर्व से भारतीय: <b>KhetMitra AI</b> <br>
                <span class="text-[11px] opacity-70 uppercase tracking-wider">सत्यम कुमार द्वारा निर्मित</span>
            </p>
        </div>

        <div id="preview" class="preview-box">
            <i class="fas fa-cloud-upload-alt text-6xl text-slate-200"></i>
            <p class="text-slate-400 mt-4 font-bold text-sm">फसल की फोटो यहाँ दिखेगी</p>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handleFile(event)">
        <input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="handleFile(event)">

        <div class="flex flex-col">
            <button onclick="document.getElementById('camera-input').click()" class="action-btn btn-camera">
                <i class="fas fa-camera text-xl"></i> फोटो खींचें (Camera)
            </button>
            <button onclick="document.getElementById('gallery-input').click()" class="action-btn btn-gallery">
                <i class="fas fa-images text-xl"></i> गैलरी से चुनें (Gallery)
            </button>
        </div>

        <div id="v-report" class="hidden report-card">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600"><i class="fas fa-magic"></i></div>
                <b class="text-slate-800">AI जांच रिपोर्ट</b>
            </div>
            <div id="report-text" class="text-sm leading-relaxed text-slate-600 whitespace-pre-wrap"></div>
        </div>
    </main>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCSvMpcYvrUzPaii6ijoNAPUF6PAG4zhGY",
            authDomain: "khetmitra-4bc9e.firebaseapp.com",
            projectId: "khetmitra-4bc9e",
            storageBucket: "khetmitra-4bc9e.firebasestorage.app",
            messagingSenderId: "545280122993",
            appId: "1:545280122993:web:dd23233f2e2090c6513bd0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let REMOTE_API_KEY = "";

        // 1. Fetch API Key from Database on Load
        async function fetchKey() {
            try {
                const doc = await db.collection('settings').doc('api_config').get();
                if (doc.exists) {
                    REMOTE_API_KEY = doc.data().gemini_key;
                    console.log("Secure Key Loaded");
                } else {
                    console.error("No such document!");
                }
            } catch (error) {
                console.error("Error fetching key:", error);
            }
        }
        fetchKey();

        async function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!REMOTE_API_KEY) { alert("सर्वर लोड हो रहा है, कृपया 2 सेकंड रुकें..."); return; }

            const report = document.getElementById('v-report');
            const reportText = document.getElementById('report-text');
            const preview = document.getElementById('preview');

            const reader = new FileReader();
            reader.onload = (e) => preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
            reader.readAsDataURL(file);

            report.classList.remove('hidden');
            reportText.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i> KhetMitra AI विश्लेषण कर रहा है...";
            report.scrollIntoView({ behavior: 'smooth' });

            const base64Data = await compressImage(file);
            runAiVision(base64Data, reportText);
        }

        async function runAiVision(base64Data, element) {
            const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${REMOTE_API_KEY}`;
            
            try {
                const res = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "You are KhetMitra AI, developed by Satyam Kumar. Identify the crop disease in this image and suggest organic and chemical treatments in simple Hindi. Be very specific for Indian farmers." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }]
                    })
                });
                
                const data = await res.json();
                if (data.candidates && data.candidates[0].content) {
                    element.innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('v-report').scrollIntoView({ behavior: 'smooth' });
                } else {
                    element.innerText = "AI इस फोटो को नहीं समझ पाया। कृपया पत्ती की साफ़ फोटो पास से खींचें।";
                }
            } catch (e) {
                element.innerText = "सर्वर से कनेक्ट नहीं हो पाया। कृपया इंटरनेट चेक करें।";
            }
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                        else { if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]); 
                    };
                };
            });
        }
    </script>
</body>
</html>
