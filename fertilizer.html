<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>खाद सलाह - KhetMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --s: #064e3b; }
        body { font-family: 'Mukta', sans-serif; background: #f8fafc; margin: 0; }
        .premium-gradient { background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%) !important; }
        .glass { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 25px; margin-top: 20px; }
        select, input { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #e2e8f0; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center gap-4 shadow-lg sticky top-0">
        <i class="fas fa-arrow-left" onclick="window.location.href='./home.html'"></i>
        <h2 class="font-bold text-xl">खाद कैलकुलेटर</h2>
    </header>
    <main class="p-6">
        <div class="glass">
            <select id="crop"><option>धान (Paddy)</option><option>गेहूं (Wheat)</option><option>सरसों (Mustard)</option></select>
            <input type="number" id="area" placeholder="एकड़ (Acre)">
            <button onclick="calculate()" class="w-full premium-gradient p-5 rounded-2xl text-white font-bold shadow-lg active:scale-95 transition-all">मात्रा जानें (AI)</button>
        </div>
        <div id="result-box" class="hidden mt-6 glass bg-green-50 border-green-200">
            <div id="res-text" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </main>
    <script>
        const K1 = "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";
        const K2 = "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";

        async function calculate() {
            const crop = document.getElementById('crop').value; const area = document.getElementById('area').value;
            const txt = document.getElementById('res-text'); if(!area) return;
            document.getElementById('result-box').classList.remove('hidden'); txt.innerText = "AI गणना कर रहा है...";

            const prompt = `Fertilizer calculation for ${area} acre of ${crop} in Hindi`;

            try {
                await callFert(K1, "google/gemma-2-27b-it", prompt, txt);
            } catch (e) {
                try {
                    await callFert(K2, "be-pal/owl-v2", prompt, txt);
                } catch (err) {
                    txt.innerText = "सर्वर त्रुटि!";
                }
            }
        }

        async function callFert(key, model, prompt, el) {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: 'POST',
                headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                body: JSON.stringify({ "model": model, "messages": [{"role": "user", "content": prompt}] })
            });
            const data = await res.json();
            if (data.choices) { el.innerText = data.choices[0].message.content; } else { throw new Error("Fail"); }
        }
    </script>
</body>
</html>
