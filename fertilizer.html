<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KhetMitra - खाद सलाह</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --s: #064e3b; }
        body { font-family: 'Mukta', sans-serif; background: #f8fafc; margin: 0; }
        .premium-gradient { background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%) !important; }
        .glass { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 25px; margin-top: 20px; }
        select, input { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #e2e8f0; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center gap-4 shadow-lg sticky top-0">
        <i class="fas fa-arrow-left" onclick="window.location.href='home.html'"></i>
        <h2 class="font-bold text-xl">खाद कैलकुलेटर</h2>
    </header>
    <main class="p-6">
        <div class="glass">
            <label class="font-bold text-slate-700">फसल चुनें</label>
            <select id="crop"><option>धान (Paddy)</option><option>गेहूं (Wheat)</option><option>सरसों (Mustard)</option></select>
            <label class="font-bold text-slate-700">एकड़ (Acre)</label>
            <input type="number" id="area" placeholder="जैसे: 2">
            <button onclick="calculate()" class="w-full premium-gradient p-5 rounded-2xl text-white font-bold shadow-lg active:scale-95 transition-all">मात्रा जानें (AI)</button>
        </div>
        <div id="result-box" class="hidden mt-6 glass bg-green-50 border-green-200">
            <h4 class="font-bold text-green-800 mb-2">AI की सलाह:</h4>
            <div id="res-text" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </main>
    <script>
        const AK = "AIzaSyDdms2rUBleiIHTDHST6rAEZdZDQ5Kt_oQ";
        const EP = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${AK}`;
        async function calculate() {
            const crop = document.getElementById('crop').value; const area = document.getElementById('area').value;
            const txt = document.getElementById('res-text'); if(!area) return;
            document.getElementById('result-box').classList.remove('hidden'); txt.innerText = "गणना हो रही है...";
            try {
                const res = await fetch(EP, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents:[{parts:[{text: "Fertilizer math for "+area+" acre of "+crop+" in Hindi"}]}]}) });
                const data = await res.json(); txt.innerText = data.candidates[0].content.parts[0].text;
            } catch(e) { txt.innerText = "त्रुटि!"; }
        }
    </script>
</body>
</html>
