<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KhetMitra - सरकारी योजनाएं</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --s: #064e3b; --bg: #f8fafc; }
        body { font-family: 'Mukta', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .premium-gradient { background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%) !important; }
        .glass { background: white; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; padding: 20px; margin-bottom: 15px; }
        .scheme-card { border-left: 6px solid var(--p); }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center gap-4 shadow-lg sticky top-0 z-50">
        <i class="fas fa-arrow-left" onclick="window.location.href='home.html'"></i>
        <h2 class="font-bold text-xl">सरकारी योजनाएं</h2>
    </header>
    <main class="p-6">
        <div class="glass bg-green-50 border-green-200">
            <h3 class="font-bold text-green-800 mb-2"><i class="fas fa-magic mr-2"></i>AI योजना खोजें</h3>
            <div class="flex gap-2">
                <input type="text" id="scheme-query" placeholder="अपनी ज़रूरत लिखें..." class="flex-1 p-3 rounded-xl border-none outline-none text-sm shadow-inner">
                <button onclick="findScheme()" class="bg-green-600 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-search"></i></button>
            </div>
            <div id="ai-res" class="hidden mt-4 text-sm text-slate-700 leading-relaxed border-t pt-3 border-green-100"></div>
        </div>
        <div class="glass scheme-card"><h3 class="font-bold text-green-700">PM-किसान सम्मान निधि</h3><p class="text-xs text-slate-500">₹6,000 सालाना सीधे खाते में।</p></div>
        <div class="glass scheme-card" style="border-left-color: #f59e0b;"><h3 class="font-bold text-orange-700">कुसुम योजना</h3><p class="text-xs text-slate-500">सोलर पंप पर 90% सब्सिडी।</p></div>
    </main>
    <script>
        const AK = "AIzaSyDdms2rUBleiIHTDHST6rAEZdZDQ5Kt_oQ";
        const EP = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${AK}`;
        async function findScheme() {
            const q = document.getElementById('scheme-query').value;
            const resBox = document.getElementById('ai-res');
            if(!q) return;
            resBox.classList.remove('hidden'); resBox.innerHTML = "खोज रहा है...";
            try {
                const res = await fetch(EP, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents:[{parts:[{text: "Farmer Scheme help in Hindi for: " + q}]}]}) });
                const data = await res.json(); resBox.innerText = data.candidates[0].content.parts[0].text;
            } catch(e) { resBox.innerText = "नेटवर्क त्रुटि!"; }
        }
    </script>
</body>
</html>
