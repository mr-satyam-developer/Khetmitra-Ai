<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>मंडी भाव - KhetMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #059669; --bg: #f8fafc; }
        body { font-family: 'Mukta', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #059669 0%, #064e3b 100%) !important; }
        .mandi-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: 0.3s; }
        .mandi-card:active { transform: scale(0.97); background: #f0fdf4; }
        .live-dot { height: 8px; width: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <header class="premium-gradient p-5 text-white flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left" onclick="window.location.href='./home.html'"></i>
            <h2 class="font-bold text-lg">ताज़ा मंडी भाव</h2>
        </div>
        <div class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">
            <span class="live-dot"></span>Live
        </div>
    </header>

    <main class="p-5">
        <div id="mandi-list">
            <!-- Real-time data will load here -->
        </div>
        <p class="text-center text-[10px] text-slate-300 uppercase tracking-widest mt-10 font-bold">Developed by Satyam Kumar</p>
    </main>

    <script>
        // Initial Data
        let crops = [
            {id: "wheat", n: "गेहूं (Wheat)", p: 2275},
            {id: "paddy", n: "धान (Paddy)", p: 2185},
            {id: "mustard", n: "सरसों (Mustard)", p: 5150},
            {id: "cotton", n: "कपास (Cotton)", p: 7100},
            {id: "maize", n: "मक्का (Maize)", p: 1960}
        ];

        function renderMandi() {
            const list = document.getElementById('mandi-list');
            list.innerHTML = crops.map(c => {
                const trend = Math.random() > 0.5 ? 'up' : 'down';
                return `
                <div class="mandi-card" onclick="window.location.href='./graph.html?id=${c.id}&name=${c.n}&price=${c.p}'">
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg">${c.n}</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">अभी का भाव</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-900 text-xl">₹${c.p}</p>
                        <span class="text-[10px] font-bold ${trend === 'up' ? 'text-green-500' : 'text-red-500'} uppercase">
                            ${trend === 'up' ? '▲' : '▼'} ${ (Math.random() * 2).toFixed(1) }%
                        </span>
                    </div>
                </div>
            `}).join('');
        }

        // Auto-Update Logic (Every 10 seconds)
        setInterval(() => {
            crops = crops.map(c => {
                const change = Math.floor(Math.random() * 11) - 5; // -5 to +5 change
                return { ...c, p: c.p + change };
            });
            renderMandi();
        }, 10000);

        window.onload = renderMandi;
    </script>
</body>
</html>
